name: Render Excalidraw

on:
  push:
    paths:
      - '**/*.excalidraw'
      - '.github/workflows/excalidraw-render.yml'
  workflow_dispatch:
    inputs:
      format:
        description: 'Output format'
        required: false
        default: 'svg'
        type: choice
        options:
          - svg
          - png
          - both

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Excalidraw files
        uses: ./
        with:
          format: ${{ inputs.format || 'svg' }}

      - name: Commit rendered files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: render excalidraw files [skip ci]"
          git push
