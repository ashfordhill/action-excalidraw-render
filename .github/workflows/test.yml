name: Self-Test

on:
  push:
    branches-ignore: [main]
    paths:
      - '**/*.excalidraw'
      - 'action.yml'
      - 'Dockerfile'
      - 'render.sh'
      - '.github/workflows/test.yml'
  workflow_dispatch:
    inputs:
      format:
        description: 'Output format'
        required: false
        default: 'both'
        type: choice
        options:
          - svg
          - png
          - both

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Excalidraw files
        uses: ./
        with:
          format: ${{ inputs.format || 'both' }}

      - name: Commit rendered files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add '**/*.svg' '**/*.png'
          git diff --staged --quiet || git commit -m "test: render excalidraw files [skip ci]"
          git push
