# Local development / manual testing only.
# The GitHub Action (action.yml) manages containers directly via docker CLI
# and does not use this file.
#
# Usage:
#   INPUT_FORMAT=both docker compose run --rm renderer
#
services:
  excalidraw:
    image: excalidraw/excalidraw@sha256:3c2513e830bb6e195147c05b34ecf8393d0ba2b1cc86e93b407a5777d6135c6c
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s

  renderer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      excalidraw:
        condition: service_healthy
    environment:
      EXCALIDRAW_BRUTE_EXPORT_CLI_URL: "http://excalidraw:80"
      INPUT_FORMAT: "${INPUT_FORMAT:-svg}"
      INPUT_GITHUB_TOKEN: "${INPUT_GITHUB_TOKEN:-}"
      INPUT_COMMIT_MESSAGE: "${INPUT_COMMIT_MESSAGE:-chore: render excalidraw files [skip ci]}"
      INPUT_COMMITTER_NAME: "${INPUT_COMMITTER_NAME:-github-actions[bot]}"
      INPUT_COMMITTER_EMAIL: "${INPUT_COMMITTER_EMAIL:-github-actions[bot]@users.noreply.github.com}"
      GITHUB_WORKSPACE: "/workspace"
      GITHUB_REPOSITORY: "${GITHUB_REPOSITORY:-}"
    volumes:
      - "${GITHUB_WORKSPACE:-.}:/workspace"
